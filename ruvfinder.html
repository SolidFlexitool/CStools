<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSTools RUV Finder</title>
<script>
  (function(){
    var saved = localStorage.getItem('cstools-theme');
    var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<style>
  :root{
    --bg:            #0a0f1c;
    --panel:         #101a2c;
    --panel-alt:     #16233a;
    --line:          #223252;
    --text:          #e8edf6;
    --muted:         #8b98ac;
    --teal:          #2dd4bf;
    --teal-dim:      #1a3a37;
    --amber:         #f5a623;
    --danger:        #ef4444;
    --surface:       #0d1626;
    --mono: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color-scheme: dark;
  }

  html[data-theme="light"]{
    --bg:            #f5f7fb;
    --panel:         #ffffff;
    --panel-alt:     #eef2f9;
    --line:          #dbe3ef;
    --text:          #10182b;
    --muted:         #5b6b84;
    --teal:          #0f9c8f;
    --teal-dim:      #d9f5f1;
    --amber:         #b5790f;
    --danger:        #dc2626;
    --surface:       #eef2f9;
    color-scheme: light;
  }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(1100px 600px at 15% -10%, #12213f 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 10%, #142a2a 0%, transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    padding:1.5rem 1rem 3rem;
    display:flex;
    flex-direction:column;
    align-items:center;
    transition:background-color .3s ease, color .3s ease;
  }

  html[data-theme="light"] body{
    background:
      radial-gradient(1100px 600px at 15% -10%, #e2ecff 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 10%, #dcf5ef 0%, transparent 55%),
      var(--bg);
  }

  /* ---------- header ---------- */
  .topbar{
    width:100%; max-width:900px;
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:1.25rem; gap:1rem;
  }
  .brand{ display:flex; align-items:center; gap:.65rem; }
  .theme-toggle{
    flex:0 0 auto; width:42px; height:42px; border-radius:12px;
    background:var(--panel-alt); border:1px solid var(--line); color:var(--text);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition:border-color .15s ease, transform .15s ease, background .15s ease;
  }
  .theme-toggle:hover{ border-color:var(--teal); transform:translateY(-1px); }
  .theme-toggle:focus-visible{ outline:2px solid var(--teal); outline-offset:2px; }
  .theme-toggle svg{ width:18px; height:18px; }
  .theme-toggle .icon-sun{ display:none; }
  .theme-toggle .icon-moon{ display:block; }
  html[data-theme="light"] .theme-toggle .icon-sun{ display:block; }
  html[data-theme="light"] .theme-toggle .icon-moon{ display:none; }
  .brand-mark{
    width:38px; height:38px; border-radius:10px;
    background:linear-gradient(145deg, var(--teal), #1b8f82);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-weight:700; color:#03211d; font-size:.95rem;
    box-shadow:0 0 0 1px rgba(45,212,191,.25), 0 8px 24px -8px rgba(45,212,191,.5);
  }
  .brand img.glow-logo{ width:38px; height:38px; border-radius:10px; object-fit:cover; }
  .brand-text{ line-height:1.1; }
  .brand-text strong{ display:block; font-size:1.05rem; letter-spacing:.01em; }
  .brand-text span{ color:var(--muted); font-size:.78rem; }

  .nav-container{ display:flex; flex-wrap:wrap; justify-content:center; gap:.6rem; margin-bottom:1.5rem; }
  .nav-button{
    display:inline-flex; align-items:center; gap:.4rem;
    background:var(--panel-alt); border:1px solid var(--line); color:var(--text);
    padding:.6rem 1.05rem; border-radius:999px; text-decoration:none;
    font-weight:500; font-size:.85rem;
    transition:border-color .18s ease, transform .18s ease, background .18s ease;
  }
  .nav-button:hover{ border-color:var(--teal); background:#132437; transform:translateY(-1px); }
  .nav-button:focus-visible{ outline:2px solid var(--teal); outline-offset:2px; }
  .nav-button.current{ border-color:var(--teal); background:var(--teal-dim); color:var(--teal); }

  /* ---------- layout ---------- */
  .main-container{
    display:flex; gap:1.25rem; flex-wrap:wrap; justify-content:center;
    width:100%; max-width:900px;
  }
  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:20px;
    box-shadow:0 30px 60px -30px rgba(0,0,0,.6);
    padding:1.5rem; display:flex; flex-direction:column;
  }
  .panel.search{ flex:1 1 420px; min-width:300px; }
  .panel.calc{ flex:0 1 300px; min-width:260px; }

  .panel h1, .panel h2{ margin:0 0 .25rem; font-size:1.2rem; text-align:center; }
  .panel > p.sub{ margin:0 0 1.25rem; color:var(--muted); font-size:.82rem; text-align:center; }

  .field{ margin-bottom:1rem; }
  .field label{ display:block; margin-bottom:.4rem; font-size:.8rem; font-weight:500; color:var(--muted); }

  .autocomplete-container{ position:relative; }
  input[type="text"]{
    width:100%; padding:.8rem .9rem; font-size:.95rem; font-family:var(--mono);
    border:1px solid var(--line); border-radius:10px; background:var(--surface); color:var(--text);
    transition:border-color .15s ease, box-shadow .15s ease, background-color .2s ease;
  }
  input::placeholder{ color:var(--muted); font-family:var(--sans); }
  input:focus{ outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(45,212,191,.15); }

  .autocomplete-suggestions{
    position:absolute; top:calc(100% + 6px); left:0; right:0;
    background:var(--panel-alt); border:1px solid var(--line); border-radius:10px;
    max-height:220px; overflow-y:auto; z-index:1000; display:none;
    box-shadow:0 20px 40px -20px rgba(0,0,0,.7);
  }
  .autocomplete-suggestions div{
    padding:.65rem .9rem; cursor:pointer; font-family:var(--mono); font-size:.85rem;
    border-bottom:1px solid var(--line); color:var(--text);
  }
  .autocomplete-suggestions div:last-child{ border-bottom:none; }
  .autocomplete-suggestions div:hover{ background:var(--teal-dim); color:var(--teal); }

  button.primary, button.ghost{
    width:100%; padding:.75rem 1rem; font-size:.85rem; font-weight:600;
    border-radius:10px; cursor:pointer; border:1px solid transparent;
    transition:transform .15s ease, background .15s ease, border-color .15s ease;
    margin-top:.25rem;
  }
  button.primary{ background:linear-gradient(145deg, var(--teal), #17847a); color:#03211d; }
  button.primary:hover{ transform:translateY(-1px); }
  button.ghost{ background:transparent; border-color:var(--line); color:var(--muted); }
  button.ghost:hover{ border-color:#3a4d70; color:var(--text); }
  button:focus-visible{ outline:2px solid var(--teal); outline-offset:2px; }

  .calc-buttons{ display:flex; flex-direction:column; gap:.55rem; }
  .calc-buttons button{
    text-align:left; font-size:.82rem; font-weight:500;
    background:var(--panel-alt); border:1px solid var(--line); color:var(--text);
  }
  .calc-buttons button:hover{ border-color:var(--teal); color:var(--teal); transform:translateY(-1px); }
  .calc-buttons button .mult{ font-family:var(--mono); color:var(--teal); float:right; }
  .calc-buttons button:hover .mult{ color:inherit; }

  .result-card{
    margin-top:1.1rem; background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:1rem 1.1rem; display:none; min-height:1rem;
  }
  .result-card.show{ display:block; animation:fadeIn .22s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  .result-rows{ display:grid; gap:.5rem; }
  .result-row{ display:flex; justify-content:space-between; gap:1rem; font-size:.83rem; color:var(--muted); }
  .result-row .val{ font-family:var(--mono); color:var(--text); font-weight:500; text-align:right; }

  .calc-result{ min-height:1.2rem; }
  .calc-answer{
    font-family:var(--mono); font-size:1.1rem; color:var(--teal); font-weight:700; text-align:center;
  }
  .calc-answer .eq{ color:var(--muted); font-weight:400; font-size:.9rem; }

  .empty-note{ color:var(--muted); font-size:.82rem; text-align:center; padding:.25rem 0; }

  .loading{
    display:inline-flex; align-items:center; gap:.5rem; color:var(--muted); font-size:.85rem;
  }
  .spinner{
    width:16px; height:16px; border:2.5px solid var(--line); border-top:2.5px solid var(--teal);
    border-radius:50%; animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  #toast{
    position:fixed; left:50%; bottom:24px; transform:translate(-50%, 20px);
    background:var(--teal); color:#03211d; font-weight:600; font-size:.85rem;
    padding:.7rem 1.2rem; border-radius:999px;
    box-shadow:0 10px 30px -8px rgba(45,212,191,.5);
    opacity:0; pointer-events:none; transition:all .25s ease; z-index:50;
  }
  #toast.show{ opacity:1; transform:translate(-50%, 0); }

  footer{ margin-top:1.5rem; color:var(--muted); opacity:.75; font-size:.75rem; text-align:center; }

  @media (max-width:640px){
    .main-container{ flex-direction:column; }
    .panel.search, .panel.calc{ flex:1 1 auto; width:100%; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <img src="your-logo.png" alt="" class="glow-logo" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'brand-mark',textContent:'CS'}))">
    <div class="brand-text">
      <strong>CSTools</strong>
      <span>RVS code &amp; unit lookup</span>
    </div>
  </div>
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark or light mode" aria-pressed="false" onclick="toggleTheme()">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
  </button>
</div>

<div class="nav-container">
  <a href="ruvfinder.html" class="nav-button current">RUV Finder</a>
  <a href="Misc.html" class="nav-button">Miscellaneous</a>
  <a href="index.html" class="nav-button">Calculator</a>
</div>

<div class="main-container">

  <div class="panel search">
    <h1>RUV Finder</h1>
    <p class="sub">Look up an RVS code to see its description, unit value, and category.</p>

    <div class="field">
      <label for="codeInput">RVS code</label>
      <div class="autocomplete-container">
        <input type="text" id="codeInput" placeholder="e.g. 12345" autocomplete="off" aria-describedby="result">
        <div id="suggestions" class="autocomplete-suggestions"></div>
      </div>
    </div>
    <button class="primary" onclick="searchCode()">Search</button>
    <div class="result-card" id="result" role="region" aria-live="polite"></div>
  </div>

  <div class="panel calc">
    <h2>Unit Multiplier 2026</h2>
    <p class="sub">Search a code first, then apply the room-type multiplier.</p>
    <div class="calc-buttons">
      <button onclick="multiplyUnit(155)">Ward / OP <span class="mult">× 155</span></button>
      <button onclick="multiplyUnit(160)">Semi-Private <span class="mult">× 160</span></button>
      <button onclick="multiplyUnit(165)">Private <span class="mult">× 165</span></button>
      <button onclick="multiplyUnit(170)">Suite / Nursery / ICU <span class="mult">× 170</span></button>
    </div>
    <div class="result-card calc-result" id="calcResult" role="region" aria-live="polite"></div>
    <button class="ghost" onclick="copyResult('calcResult')">Copy result</button>
  </div>

</div>

<footer>CSTools RUV Finder</footer>
<div id="toast" role="status" aria-live="polite"></div>

<script>
  let data = {};
  let currentUnit = null;
  let codes = [];

  async function loadData(){
    const resultDiv = document.getElementById('result');
    try {
      const response = await fetch('data.json');
      data = await response.json();
      codes = Object.keys(data);
    } catch (error) {
      resultDiv.classList.add('show');
      resultDiv.innerHTML = '<p class="empty-note">Could not load data.json. Make sure it sits next to this file.</p>';
    }
  }

  function searchCode(code = null){
    const inputCode = code || document.getElementById('codeInput').value.trim();
    const resultDiv = document.getElementById('result');
    const calcResultDiv = document.getElementById('calcResult');
    calcResultDiv.classList.remove('show');
    calcResultDiv.innerHTML = '';
    currentUnit = null;
    document.getElementById('suggestions').style.display = 'none';

    if (!inputCode){
      resultDiv.classList.remove('show');
      resultDiv.innerHTML = '';
      return;
    }

    resultDiv.classList.add('show');
    resultDiv.innerHTML = '<div class="loading"><span class="spinner"></span>Searching…</div>';

    setTimeout(() => {
      if (data[inputCode]) {
        const item = data[inputCode];
        currentUnit = parseFloat(item.unit);
        resultDiv.innerHTML = '<div class="result-rows">' +
          resultRow('Description', item.description) +
          resultRow('Unit', item.unit) +
          resultRow('Category', item.category) +
          resultRow('Subcategory', item.subCategory) +
          '</div>';
      } else {
        resultDiv.innerHTML = '<p class="empty-note">No data found for this code.</p>';
      }
    }, 400);
  }

  function resultRow(label, value){
    return `<div class="result-row"><span>${label}</span><span class="val">${value ?? '—'}</span></div>`;
  }

  function multiplyUnit(multiplier){
    const calcResultDiv = document.getElementById('calcResult');
    calcResultDiv.classList.add('show');
    if (currentUnit !== null){
      const result = Math.trunc(currentUnit * multiplier);
      calcResultDiv.innerHTML = `<div class="calc-answer">${currentUnit} <span class="eq">×</span> ${multiplier} <span class="eq">=</span> ${result.toLocaleString('en-PH')}</div>`;
    } else {
      calcResultDiv.innerHTML = '<p class="empty-note">Search a code first.</p>';
    }
  }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(showToast._tid);
    showToast._tid = setTimeout(() => t.classList.remove('show'), 1800);
  }

  function copyToClipboard(text){
    return new Promise((resolve, reject) => {
      if (navigator.clipboard && window.isSecureContext){
        navigator.clipboard.writeText(text).then(resolve).catch(() => legacyCopy(text, resolve, reject));
      } else {
        legacyCopy(text, resolve, reject);
      }
    });
  }

  function legacyCopy(text, resolve, reject){
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.top = '-9999px';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, text.length);
    try {
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      ok ? resolve() : reject(new Error('execCommand copy failed'));
    } catch (err){
      document.body.removeChild(ta);
      reject(err);
    }
  }

  function copyResult(id){
    const el = document.getElementById(id);
    const text = el.innerText.trim();
    if (!text){ showToast('Nothing to copy yet'); return; }
    copyToClipboard(text).then(() => showToast('Result copied'))
      .catch(() => showToast('Could not copy — select the text manually'));
  }

  // Autocomplete
  document.getElementById('codeInput').addEventListener('input', function(){
    const query = this.value.trim().toLowerCase();
    const suggestionsDiv = document.getElementById('suggestions');
    suggestionsDiv.innerHTML = '';

    if (query.length > 0){
      const matches = codes.filter(code => code.toLowerCase().includes(query)).slice(0, 6);
      if (matches.length > 0){
        matches.forEach(match => {
          const div = document.createElement('div');
          div.textContent = match;
          div.onclick = () => {
            document.getElementById('codeInput').value = match;
            searchCode(match);
          };
          suggestionsDiv.appendChild(div);
        });
        suggestionsDiv.style.display = 'block';
      } else {
        suggestionsDiv.style.display = 'none';
      }
    } else {
      suggestionsDiv.style.display = 'none';
    }
  });

  document.addEventListener('click', function(e){
    if (!document.querySelector('.autocomplete-container').contains(e.target)){
      document.getElementById('suggestions').style.display = 'none';
    }
  });

  document.getElementById('codeInput').addEventListener('keydown', function(event){
    if (event.key === 'Enter') searchCode();
  });

  function toggleTheme(){
    const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
    const next = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('cstools-theme', next);
    const btn = document.getElementById('themeToggle');
    if (btn) btn.setAttribute('aria-pressed', next === 'light' ? 'true' : 'false');
  }
  (function syncThemeButton(){
    const btn = document.getElementById('themeToggle');
    if (btn) btn.setAttribute('aria-pressed', document.documentElement.getAttribute('data-theme') === 'light' ? 'true' : 'false');
  })();

  window.onload = loadData;
</script>
</body>
</html>
