<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> CSTools Calculator</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #010048;
      color: #fff;
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .nav-button {
      display: inline-block;
      background-color: #4facfe;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      text-align: center;
      transition: background 0.3s ease, transform 0.2s;
      margin: 0.5rem;
    }
    .nav-button:hover {
      background-color: #00f2fe;
      transform: translateY(-2px);
    }
    .container {
      max-width: 800px;
      width: 100%;
      padding: 2rem;
      background-color: #1c2b3a;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0, 0, 50, 0.5);
      margin-top: 1rem;
    }
    h1, h2 {
      text-align: center;
      color: #4facfe;
      margin-bottom: 1rem;
    }
    select, input[type="number"], input[type="text"] {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background-color: #e0e0e0;
      color: #000;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      background: #4facfe;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      margin-top: 10px;
      color: white;
      font-weight: 500;
    }
    button:hover {
      background: #00f2fe;
      transform: translateY(-2px);
    }
    .scheme {
      display: none;
      background-color: #0d1b2a;
      padding: 1.5rem;
      border-radius: 8px;
      margin-top: 1rem;
    }
    .result {
      background-color: #e0e0e0;
      border-radius: 8px;
      padding: 1rem;
      color: #000;
      margin-top: 10px;
      line-height: 1.6;
    }
    .result p strong {
      color: #1e88e5;
    }
    .logo-container {
      text-align: center;
      margin-bottom: 1rem;
    }
    .glow-logo {
      width: 220px;
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 0 20px #4facfe, 0 0 40px #00f2fe, 0 0 60px #4facfe;
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from {
        box-shadow: 0 0 10px #4facfe, 0 0 20px #00f2fe, 0 0 30px #4facfe;
      }
      to {
        box-shadow: 0 0 20px #00f2fe, 0 0 40px #4facfe, 0 0 60px #00f2fe;
      }
    }
    .nav-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }
      .container {
        padding: 1rem;
      }
      .nav-container {
        flex-direction: column;
        align-items: center;
      }
      .nav-button {
        width: 100%;
        max-width: 300px;
      }
      .glow-logo {
        width: 150px;
      }
    }
    button:focus, .nav-button:focus, select:focus, input:focus {
      outline: 2px solid #4facfe;
      outline-offset: 2px;
    }
    .scheme h2 {
      margin-top: 0;
    }
    .discount-input {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Logo -->
  <div class="logo-container">
    <img src="your-logo.png" alt="CSTools Logo" class="glow-logo">
  </div>

  <!-- Navigation Buttons -->
  <div class="nav-container">
    <a href="ruvfinder.html" class="nav-button">Go to RUV FINDER</a>
    <a href="Misc.html" class="nav-button">Go to Miscellaneous</a>
    <a href="index.html" class="nav-button">Go to Calculator</a>
  </div>

  <div class="container">
    <h1>CSTools Calculator</h1>

    <label for="schemeSelect" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Select a Scheme:</label>
    <select id="schemeSelect" onchange="showScheme()">
      <option value="scheme1" selected="selected">Scheme 1: 7500 Per Procedure in Excess 70/30</option>
      <option value="scheme2">Scheme 2: In excess of 10,000 OP Limit 80/20</option>
      <option value="scheme3">Scheme 3: 5000 Excess 50/50</option>
      <option value="scheme4">Scheme 4: 2000 Excess 70/30</option>
      <option value="scheme5">Scheme 5: 5000 Excess 70/30</option>
      <option value="scheme7">Scheme 6: 50/50 Sharing Scheme</option>
      <option value="scheme8">Scheme 7: 70/30 Sharing Scheme </option>
      <option value="scheme6">INCREMENTAL COMPUTATION</option>   
    </select>

    <!-- ALL SCHEMES ARE NOW PROPERLY INSIDE CONTAINER -->

    <div class="scheme" id="scheme1">
      <h2>Scheme 1: 7500 Excess 70/30</h2>
      <label for="amount1">Enter the Procedure Amount:</label>
      <input type="number" id="amount1" placeholder="Enter the Procedure Amount" oninput="calculateExcess1()">
      <div style="margin: 1rem 0;">
        <input type="checkbox" id="discountCheckbox" onchange="calculateExcess1()">
        <label for="discountCheckbox">Apply Senior/PWD Discount</label>
      </div>
      <div id="scheme1Result" class="result"></div>
      <button onclick="copyResult('scheme1Result')">Copy Result</button>
    </div>

    <div class="scheme" id="scheme2">
      <h2>Scheme 2: 10k OP Limit in excess 80/20</h2>
      <label for="remainingLimit">Enter Remaining Limit (if no remaining put 0):</label>
